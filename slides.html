<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>JMJ Intelligence — slides</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Spline+Sans:wght@300;400;500&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0c10;--line:rgba(255,255,255,0.11);--fg:#f5f6f8;--muted:rgba(245,246,248,0.6);--faint:rgba(245,246,248,0.34);--gold:#F5B301;
  --display:'Bricolage Grotesque',Georgia,serif;--body:'Spline Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace}
body{background:radial-gradient(1000px 600px at 80% -8%,rgba(0,188,235,0.08),transparent 60%),radial-gradient(800px 520px at 6% 4%,rgba(245,179,1,0.07),transparent 55%),var(--bg);
  color:var(--fg);font-family:var(--body);-webkit-font-smoothing:antialiased;min-height:100vh}
.wrap{max-width:1180px;margin:0 auto;padding:40px 22px 80px}
header{margin-bottom:28px}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--faint)}
h1{font-family:var(--display);font-weight:800;letter-spacing:-0.02em;font-size:clamp(28px,5vw,44px);margin-top:12px}
h1 .gold{color:var(--gold)}
header p{color:var(--muted);font-size:14.5px;margin-top:8px}
.count{font-family:var(--mono);font-size:12px;color:var(--faint);margin-top:14px}

.slidecard{margin-bottom:30px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:rgba(255,255,255,0.02)}
.slidecard .bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--line)}
.slidecard .bar .t{font-family:var(--display);font-weight:800;font-size:18px}
.slidecard .bar .nx{font-family:var(--mono);font-size:11px;color:var(--gold);letter-spacing:1px}
.slidecard a.full{font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--line);padding:6px 11px;border-radius:8px}
.slidecard a.full:hover{color:var(--gold);border-color:var(--gold)}
.slidecard img{width:100%;display:block}

footer{margin-top:10px;color:var(--faint);font-family:var(--mono);font-size:11px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">JMJ Intelligence · confidential</div>
    <h1>The <span class="gold">slides</span> so far</h1>
    <p>Tap any slide to open it full-size. More will be added here as we build them.</p>
    <div class="count">2 slides</div>
  </header>

  <div class="slidecard">
    <div class="bar"><span class="t">1 · The components</span><span class="nx">the system</span><a class="full" href="urban-system-components.png" target="_blank">Open full ↗</a></div>
    <a href="urban-system-components.png" target="_blank"><img src="urban-system-components.png" alt="The Urban Intelligence System — components"></a>
  </div>

  <div class="slidecard">
    <div class="bar"><span class="t">2 · The roadmap — where we are</span><span class="nx">25% · first fleet built</span><a class="full" href="roadmap-where-we-are.png" target="_blank">Open full ↗</a></div>
    <a href="roadmap-where-we-are.png" target="_blank"><img src="roadmap-where-we-are.png" alt="Roadmap — where we are"></a>
  </div>

  <footer>SodaLabs × Jozi My Jozi · confidential · slides viewer</footer>
</div>
</body>
</html>
